name: Rust CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

permissions:
    contents: read
    packages: write

env:
    CARGO_TERM_COLOR: always

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/setup
            - name: Check format
              run: cargo fmt --all -- --check
            - name: Check clippy
              run: cargo clippy -- -D warnings
            - name: Run tests
              run: cargo test

    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: ./.github/actions/setup
            - name: Build
              run: cargo build

    docker:
        name: Docker
        needs: [check, build]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Cache Docker layers
              uses: actions/cache@v3
              with:
                  path: /tmp/.buildx-cache
                  key: ${{ runner.os }}-buildx-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-buildx-

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.PACKAGES_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: docker/bot/Dockerfile
                  push: ${{ github.ref == 'refs/heads/main' }}
                  platforms: linux/arm64
                  tags: |
                      ghcr.io/swiip/rpg-club-app-bot:latest
                      ghcr.io/swiip/rpg-club-app-bot:${{ github.sha }}
                  labels: |
                      org.opencontainers.image.source=https://github.com/swiip/rpg-club-app
                      org.opencontainers.image.description=RPG Club App Bot service
                  cache-from: type=local,src=/tmp/.buildx-cache
                  cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

            - name: Move cache
              run: |
                  rm -rf /tmp/.buildx-cache
                  mv /tmp/.buildx-cache-new /tmp/.buildx-cache
